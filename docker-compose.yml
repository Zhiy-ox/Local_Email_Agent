# Local Email Agent — web layer in Docker.
#
#   docker compose up --build      → open http://localhost:8000
#
# Prerequisite (runs natively on your Mac, NOT in Docker):
#   python -m mlx_lm.server --model mlx-community/Llama-3.2-3B-Instruct-4bit --port 8080
#
# The Mail/Calendar worker (agent_mail_calendar.py) and real Calendar writes
# also run natively on the host; this container serves the UI + LLM endpoints
# and reads the digest the host worker writes into ./logs.

services:
  web:
    build: .
    image: local-email-agent-web
    ports:
      - "8000:8000"
    environment:
      BIND_HOST: 0.0.0.0
      PORT: 8000
      # --- LLM backend (defaults to host MLX) ---
      LLM_BACKEND: mlx
      LLM_BASE_URL: http://host.docker.internal:8080
      LLM_MODEL: mlx-community/Llama-3.2-3B-Instruct-4bit
      # For a cloud backend instead, e.g.:
      #   LLM_BACKEND: openai
      #   LLM_MODEL: gpt-4o-mini
      #   LLM_API_KEY: ${LLM_API_KEY}
    extra_hosts:
      # Lets the container resolve the host on Linux; harmless on macOS/Windows,
      # where Docker Desktop provides host.docker.internal automatically.
      - "host.docker.internal:host-gateway"
    volumes:
      # Share runtime state with the host: the native worker writes the digest
      # here, and the container reads it (and persists todos / audit).
      - ./logs:/app/logs
      - ./state:/app/state
    restart: unless-stopped
